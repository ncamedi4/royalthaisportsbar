# Decap CMS - konfiguration for Royal Thai SportsBar
# https://decapcms.org/docs/configuration-options/

backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'Skapa {{collection}} "{{slug}}"'
    update: 'Uppdatera {{collection}} "{{slug}}"'
    delete: 'Ta bort {{collection}} "{{slug}}"'
    uploadMedia: 'Ladda upp bild "{{path}}"'
    deleteMedia: 'Ta bort bild "{{path}}"'

# Netlify Identity - anvands for inloggning
publish_mode: simple

# Bildhantering
media_folder: "uploads"
public_folder: "/uploads"

# Sprak i admin-panelen
locale: 'sv'

site_url: https://royalthaisportsbar.netlify.app
display_url: https://royalthaisportsbar.netlify.app
logo_url: https://i.postimg.cc/zXMWnwt0/Namnlo-s-design.png

collections:

  # ============ TEXTER PA SAJTEN ============
  - name: "texts"
    label: "Texter"
    description: "Redigera alla textblock pa sajten - hero, intro, om oss, kontakt osv. Andringar publiceras automatiskt inom en minut."
    files:
      - file: "data/texts.json"
        name: "texts"
        label: "Texter"
        fields:
          - name: hero
            label: "Hero (startsida - text under loggan)"
            widget: object
            collapsed: false
            fields:
              - {name: tagline, label: "Tagline under loggan", widget: string, hint: "Kort mening som visas under Royal Thai-loggan"}

          - name: intro
            label: "Intro (startsida - forsta sektionen)"
            widget: object
            collapsed: true
            fields:
              - {name: title, label: "Rubrik", widget: string}
              - {name: text, label: "Brodtext", widget: text}

          - name: banner_sport
            label: "Sport-banner (mork sektion mitt pa startsidan)"
            widget: object
            collapsed: true
            fields:
              - {name: title, label: "Rubrik", widget: string}
              - {name: text, label: "Brodtext", widget: text}

          - name: feature_cta
            label: "Feature-CTA (stor bild med rubrik under)"
            widget: object
            collapsed: true
            fields:
              - {name: title, label: "Rubrik", widget: string}

          - name: om_oss_teaser
            label: "Om oss-teaser (pa startsidan)"
            widget: object
            collapsed: true
            fields:
              - {name: title, label: "Rubrik", widget: string}
              - {name: text, label: "Brodtext", widget: text}

          - name: om_oss_page
            label: "Om oss-sidan"
            widget: object
            collapsed: true
            fields:
              - {name: intro, label: "Intro-text (overst pa Om oss-sidan)", widget: text}
              - {name: heading, label: "Rubrik under statistiken", widget: string}
              - {name: paragraph_1, label: "Brodtext - stycke 1", widget: text}
              - {name: paragraph_2, label: "Brodtext - stycke 2", widget: text}

          - name: events_page
            label: "Evenemang-sidan (topp)"
            widget: object
            collapsed: true
            fields:
              - {name: title, label: "Rubrik", widget: string}
              - {name: lead, label: "Under-rubrik", widget: text}

          - name: order_page
            label: "Bestall Online-sidan (topp)"
            widget: object
            collapsed: true
            fields:
              - {name: title, label: "Rubrik", widget: string}
              - {name: lead, label: "Under-rubrik", widget: text}

          - name: stats
            label: "Statistik-band pa Om oss (siffror)"
            widget: object
            collapsed: true
            fields:
              - {name: rating_value, label: "Betyg (siffra)", widget: string, hint: "T.ex. '4.5' - visas som '4.5 av 5'"}
              - {name: rating_label, label: "Betyg-etikett", widget: string}
              - {name: days_value, label: "Antal dagar oppet (siffra)", widget: string}
              - {name: days_label, label: "Dagar-etikett", widget: string}
              - {name: closing_value, label: "Sena stangningstid", widget: string, hint: "T.ex. '02:00'"}
              - {name: closing_label, label: "Sena stangning-etikett", widget: string}

          - name: kontakt
            label: "Kontakt & footer"
            widget: object
            collapsed: true
            fields:
              - {name: adress, label: "Adress", widget: string}
              - {name: telefon_1, label: "Telefon 1", widget: string}
              - {name: telefon_2, label: "Telefon 2", widget: string, required: false}
              - {name: epost, label: "E-post", widget: string}
              - {name: footer_brand, label: "Kort brand-text i footer", widget: text}

  # ============ EVENEMANG ============
  - name: "events"
    label: "Evenemang"
    label_singular: "Evenemang"
    description: "Redigera vad som visas under 'Upplev mer' på startsidan och på evenemang-sidan. Markera 'Visa på startsidan' för de tre kort som ska synas på startsidan."
    files:
      - file: "data/events.json"
        name: "events"
        label: "Alla evenemang"
        fields:
          - name: items
            label: "Evenemang"
            label_singular: "evenemang"
            widget: list
            summary: "{{fields.title}} — {{fields.when}}"
            fields:
              - {name: title, label: "Titel", widget: string, hint: "T.ex. Blackjack"}
              - {name: when, label: "När", widget: string, hint: "T.ex. 'Fredag och lördag 20:00 till 02:00'"}
              - {name: description, label: "Beskrivning", widget: text}
              - {name: image, label: "Bild", widget: image, required: false, media_library: {config: {multiple: false}}}
              - {name: featured, label: "Visa på startsidan?", widget: boolean, default: false, hint: "Bara 3 av dessa syns på startsidan. Om fler an 3 ar markerade tas de tre forsta."}

  # ============ OPPETTIDER ============
  - name: "hours"
    label: "Öppettider"
    description: "Uppdatera öppettider (helger, semester osv). Skriv 'Stängt' som tid för att stänga en dag."
    files:
      - file: "data/hours.json"
        name: "hours"
        label: "Öppettider"
        fields:
          - name: items
            label: "Dagar"
            widget: list
            allow_add: false
            summary: "{{fields.day}} — {{fields.hours}}"
            fields:
              - {name: day, label: "Dag", widget: string}
              - {name: hours, label: "Tider", widget: string, hint: "T.ex. '11:30 till 22:00' eller 'Stängt'"}

  # ============ MENY ============
  - name: "menu"
    label: "Meny"
    description: "Redigera menyn. Varje kategori har flera ratter. Priserna kan skrivas som t.ex. '145 kr' eller 'från 145 kr'."
    files:
      - file: "data/menu.json"
        name: "menu"
        label: "Meny"
        fields:
          - name: categories
            label: "Kategorier"
            label_singular: "Kategori"
            widget: list
            summary: "{{fields.name}} ({{fields.items.length}} rätter)"
            fields:
              - {name: name, label: "Kategorinamn", widget: string, hint: "T.ex. 'Kycklingrätter'"}
              - name: items
                label: "Rätter"
                label_singular: "rätt"
                widget: list
                summary: "{{fields.n}} — {{fields.p}}"
                fields:
                  - {name: n, label: "Namn", widget: string, hint: "T.ex. '72. Pad Thai'"}
                  - {name: p, label: "Pris", widget: string, hint: "T.ex. 'från 145 kr'"}
                  - {name: d, label: "Beskrivning", widget: text, required: false}
